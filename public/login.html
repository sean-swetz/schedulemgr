<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Sign in — CFP Coverage</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800;900&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --lime:#B2E51E;--bg:#0B0C0A;--panel:#141613;--panel-2:#1B1E19;
    --line:#272B24;--text:#F4F6EF;--muted:#9BA294;--red:#FF5340;--radius:10px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:'Barlow',system-ui,sans-serif;background:var(--bg);color:var(--text);
    min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;
    -webkit-font-smoothing:antialiased;
  }
  .card{
    background:var(--panel);border:1px solid var(--line);border-radius:14px;
    padding:28px 24px;max-width:380px;width:100%;
  }
  .cf{font-family:'Montserrat';font-weight:900;font-size:20px;letter-spacing:.14em;color:var(--lime);text-transform:uppercase}
  .pros{font-family:'Montserrat';font-weight:700;font-size:9px;letter-spacing:.42em;color:#fff;text-transform:uppercase;margin-top:3px}
  h1{font-family:'Montserrat';font-weight:800;font-size:16px;letter-spacing:.06em;text-transform:uppercase;margin:22px 0 6px}
  p{color:var(--muted);font-size:14px;margin-bottom:18px}
  label{display:block;font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px}
  input{
    width:100%;background:var(--panel-2);border:1px solid var(--line);border-radius:8px;
    color:var(--text);font:inherit;padding:12px;margin-bottom:14px;
  }
  input:focus{outline:2px solid var(--lime);outline-offset:1px}
  button{
    width:100%;background:var(--lime);color:#0B0C0A;border:none;cursor:pointer;
    font-family:'Montserrat';font-weight:800;font-size:13px;letter-spacing:.08em;
    text-transform:uppercase;padding:13px;border-radius:8px;min-height:48px;
  }
  button:active{transform:scale(.98)}
  .msg{margin-top:16px;font-size:14px;color:var(--lime);min-height:20px}
  .msg.err{color:var(--red)}
  .dev{margin-top:22px;border-top:1px dashed var(--line);padding-top:18px;display:none}
  .dev.show{display:block}
  .dev .tag{
    font-family:'Montserrat';font-weight:800;font-size:10px;letter-spacing:.14em;
    text-transform:uppercase;color:#000;background:var(--lime);padding:2px 8px;border-radius:4px;
  }
  .dev p{margin:10px 0 12px;font-size:13px}
  .dev-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .dev-grid a{
    display:flex;align-items:center;justify-content:space-between;gap:6px;
    background:var(--panel-2);border:1px solid var(--line);border-radius:8px;
    color:var(--text);text-decoration:none;font-weight:600;font-size:13px;padding:10px 12px;
  }
  .dev-grid a:hover{border-color:var(--lime)}
  .dev-grid .role{font-size:9px;font-weight:800;letter-spacing:.08em;color:var(--lime);text-transform:uppercase}
</style>
</head>
<body>
  <form class="card" id="form">
    <img src="/logo.png" alt="CrossFit Prosperity" style="height:64px;width:auto;display:block;margin-bottom:6px">
    <h1>Coverage Board</h1>
    <p>Coaches only. Enter your email and we'll send you a sign-in link.</p>
    <label for="email">Email</label>
    <input id="email" type="email" name="email" autocomplete="email" required placeholder="you@example.com">
    <button type="submit">Send sign-in link</button>
    <div class="msg" id="msg" role="status"></div>

    <div class="dev" id="dev">
      <span class="tag">Dev sign-in</span>
      <p>No email configured — tap a coach to sign in directly.</p>
      <div class="dev-grid" id="devGrid"></div>
    </div>
  </form>
<script>
  const form = document.getElementById('form');
  const msg = document.getElementById('msg');
  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    msg.className = 'msg'; msg.textContent = 'Sending…';
    const email = document.getElementById('email').value.trim();
    try {
      const res = await fetch('/auth/request-link', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Something went wrong');
      msg.textContent = data.message || 'Check your email for a sign-in link.';
    } catch (err) {
      msg.className = 'msg err';
      msg.textContent = err.message;
    }
  });

  // Dev sign-in picker — only appears in local dev (no RESEND_API_KEY).
  (async () => {
    try {
      const res = await fetch('/auth/dev-coaches');
      const { enabled, coaches } = await res.json();
      if (!enabled || !coaches.length) return;
      document.getElementById('devGrid').innerHTML = coaches
        .map((c) => {
          const url = `/auth/dev?email=${encodeURIComponent(c.email)}`;
          const role = c.role === 'ADMIN' ? '<span class="role">admin</span>' : '';
          return `<a href="${url}"><span>${c.name}</span>${role}</a>`;
        })
        .join('');
      document.getElementById('dev').classList.add('show');
    } catch { /* dev picker is best-effort */ }
  })();
</script>
</body>
</html>
